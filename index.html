<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Primer Mes ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
    text-align: center;
    overflow-x: hidden;
}

/* 🌟 ESTRELLAS MEJORADAS */
.estrellas {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.estrellas::before,
.estrellas::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    box-shadow:
        50px 100px white, 150px 200px white, 250px 300px white,
        350px 150px white, 450px 250px white, 550px 350px white,
        650px 100px white, 750px 200px white, 850px 300px white,
        950px 150px white, 1050px 250px white, 1150px 350px white,
        1250px 100px white, 1350px 200px white, 1450px 300px white;
    animation: estrellasMove 60s linear infinite;
}

.estrellas::after {
    animation-duration: 100s;
    opacity: 0.5;
}

@keyframes estrellasMove {
    from { transform: translateY(0); }
    to { transform: translateY(-1200px); }
}

/* 🌸 PANTALLA INICIAL */
.inicio {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    transition: opacity 1s ease;
}

.inicio button {
    font-size: 1.3em;
    padding: 15px 30px;
    border-radius: 40px;
    border: none;
    background: white;
    color: #ff4b5c;
    cursor: pointer;
    animation: latido 1.5s infinite;
}

@keyframes latido {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* 💖 CONTENIDO */
.container {
    max-width: 600px;
    margin: 40px auto;
    padding: 30px;
    background: rgba(255,255,255,0.15);
    border-radius: 25px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    position: relative;
    z-index: 2;

    opacity: 0;
    transform: translateY(20px);
    transition: all 1s ease;
    display: none;
}

.container.mostrar {
    opacity: 1;
    transform: translateY(0);
}

h1 {
    color: #ff4b5c;
}

.slide {
    display: none;
    animation: fade 0.6s ease;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

.slide img {
    width: 100%;
    max-width: 350px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.slide img:hover {
    transform: scale(1.05);
    transition: 0.4s;
}

.mensaje {
    margin-top: 15px;
    color: #222;
    min-height: 60px;
}

/* BOTONES */
button {
    background: linear-gradient(45deg, #ff4b5c, #ff758c);
    color: white;
    border: none;
    padding: 12px 22px;
    border-radius: 30px;
    cursor: pointer;
    margin: 5px;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="estrellas"></div>

<div class="inicio">
    <button onclick="iniciar()">Haz clic para comenzar 💖</button>
</div>

<div class="container" id="contenido">
    <h1>Feliz 1 Mes ❤️</h1>

    <audio id="musica" loop>
        <source src="cancion.mp3" type="audio/mpeg">
    </audio>

    <!-- TODAS LAS FOTOS -->
    <div class="slide">
        <img src="foto5.jpg">
        <div class="mensaje escribir">Hoy cumplimos un mes de noviazgo...</div>
    </div>

    <div class="slide">
        <img src="foto2.jpg">
        <div class="mensaje escribir">Con el tiempo he ido descubriendo...</div>
    </div>

    <div class="slide">
        <img src="foto3.jpg">
        <div class="mensaje escribir">Es curioso porque siempre he esperado...</div>
    </div>

    <div class="slide">
        <img src="foto4.jpg">
        <div class="mensaje escribir">Gracias por quererme...</div>
    </div>

    <div class="slide">
        <img src="foto7.jpg">
        <div class="mensaje escribir">Espero en un futuro compartir más viajes...</div>
    </div>

    <div class="slide">
        <img src="foto6.jpg">
        <div class="mensaje escribir">Gracias por todo el amor...</div>
    </div>

    <div class="slide">
        <img src="foto1.jpg">
        <div class="mensaje escribir">Y esto apenas comienza… 💞</div>
    </div>

    <div>
        <button id="btnAnterior" onclick="cambiarSlide(-1)">⬅️</button>
        <button id="btnSiguiente" onclick="cambiarSlide(1)">➡️</button>
    </div>
</div>

<script>
let slideActual = 0;

function iniciar() {
    const audio = document.getElementById("musica");
    document.querySelector(".inicio").style.opacity = "0";

    setTimeout(() => {
        document.querySelector(".inicio").style.display = "none";
    }, 1000);

    const cont = document.getElementById("contenido");
    cont.style.display = "block";
    setTimeout(() => cont.classList.add("mostrar"), 50);

    audio.volume = 0.2;
    audio.play();

    mostrarSlide(0);
}

function efectoEscritura(el, vel = 40) {
    const texto = el.getAttribute("data-texto");
    el.innerHTML = "";
    let i = 0;

    function escribir() {
        if (i < texto.length) {
            el.innerHTML += texto.charAt(i);
            i++;
            setTimeout(escribir, vel);
        }
    }
    escribir();
}

window.onload = () => {
    document.querySelectorAll(".escribir").forEach(el => {
        el.setAttribute("data-texto", el.innerText);
    });
};

function mostrarSlide(n) {
    let slides = document.getElementsByClassName("slide");

    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }

    slides[n].style.display = "block";
    efectoEscritura(slides[n].querySelector(".escribir"), 50);

    document.getElementById("btnAnterior").disabled = (n === 0);
    document.getElementById("btnSiguiente").disabled = (n === slides.length - 1);
}

function cambiarSlide(n) {
    slideActual += n;
    if (slideActual < 0) slideActual = 0;
    if (slideActual >= document.getElementsByClassName("slide").length)
        slideActual = document.getElementsByClassName("slide").length - 1;

    mostrarSlide(slideActual);
}
</script>

</body>
</html>
